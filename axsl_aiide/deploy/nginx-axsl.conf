# axsl-aiide Nginx 站点配置示例
#
# 关键点:
#   1) docroot 指向 public/,index.php 作为入口
#   2) /api/stream.php 是 SSE 流式接口,必须关闭 fastcgi_buffering 和 gzip
#   3) 建议加 basic auth 或 IP 白名单(本项目允许 LLM 在服务器执行 shell,不能公网裸奔)
#
# 安装:
#   sudo cp deploy/nginx-axsl.conf /etc/nginx/sites-available/axsl
#   sudo ln -s /etc/nginx/sites-available/axsl /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    # 改成你的测试服域名或 IP
    server_name test.example.com;

    root /opt/axsl_aiide/public;
    index index.php;

    # 关闭全局 gzip,避免 SSE 被压缩缓存
    gzip off;

    # -- 可选:HTTP Basic Auth,先执行:
    #    sudo apt install apache2-utils
    #    sudo htpasswd -c /etc/nginx/.axsl_htpasswd admin
    # auth_basic           "axsl-aiide restricted";
    # auth_basic_user_file /etc/nginx/.axsl_htpasswd;

    # -- 可选:仅内网访问
    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny  all;

    client_max_body_size 32m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # SSE 专用:关缓冲、长超时
    location = /api/stream.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_buffering off;
        fastcgi_read_timeout 3600s;
        fastcgi_send_timeout 3600s;
        proxy_buffering off;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_read_timeout 300s;
    }

    # 静态资源缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # 禁止访问敏感目录
    location ~ ^/(config|storage|agent)/ {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/axsl-access.log;
    error_log  /var/log/nginx/axsl-error.log;
}
